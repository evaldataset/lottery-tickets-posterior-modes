name: check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  generated-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git \
            make \
            poppler-utils \
            ripgrep \
            texlive-bibtex-extra \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-recommended
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
      - name: Verify source repository and paper PDFs
        run: make source-repository-check PYTHON=python
      - name: Verify full artifact payload when present
        run: |
          if [ -f runs/cifar10_resnet20_long30_rewind1_mode_ticket_distribution_activation_aligned_saved_artifacts_r5_p0p3/20260506_230706/mask_artifacts.npz ]; then
            make ci-check paper-check PYTHON=python
          else
            echo "Full artifact payload absent; source-repository check completed."
          fi
